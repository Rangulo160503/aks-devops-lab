apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-blue
  namespace: proyecto-ml
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-blue
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
