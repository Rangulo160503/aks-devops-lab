# Single "production" Service for the API. The selector points at the active
# color. Blue/green switching = patch this selector. The Ingress always sends
# /api -> this Service, never directly to a colored Service.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: proyecto-ml
  labels:
    app.kubernetes.io/part-of: proyecto-ml
    app.kubernetes.io/component: api
    app.kubernetes.io/name: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api
    color: blue           # <- traffic switch lives here
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Per-color Services so smoke tests can hit a specific color before swapping
# (kubectl port-forward svc/api-blue 8000:80).
apiVersion: v1
kind: Service
metadata:
  name: api-blue
  namespace: proyecto-ml
  labels:
    app.kubernetes.io/part-of: proyecto-ml
    app.kubernetes.io/component: api
    color: blue
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api
    color: blue
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: api-green
  namespace: proyecto-ml
  labels:
    app.kubernetes.io/part-of: proyecto-ml
    app.kubernetes.io/component: api
    color: green
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api
    color: green
  ports:
    - name: http
      port: 80
      targetPort: http
