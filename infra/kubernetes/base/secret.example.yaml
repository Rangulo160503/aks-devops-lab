# Example only. Do NOT commit real values.
#
# In production, this Secret is provisioned by either:
#   - Azure Key Vault + Secrets Store CSI Driver (preferred), or
#   - `kubectl create secret generic proyecto-ml-secrets --from-literal=...`
#
# Apply it manually before the Deployments:
#   kubectl -n proyecto-ml apply -f infra/kubernetes/base/secret.example.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: proyecto-ml-secrets
  namespace: proyecto-ml
  labels:
    app.kubernetes.io/part-of: proyecto-ml
type: Opaque
stringData:
  SECRET_KEY: "change-me-in-key-vault"
  DATABASE_URL: "postgresql+psycopg://proyectoml:proyectoml@postgres:5432/proyectoml"
