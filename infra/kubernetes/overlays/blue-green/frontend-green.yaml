apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-green
  namespace: proyecto-ml
  labels:
    app.kubernetes.io/part-of: proyecto-ml
    app.kubernetes.io/component: web
    app.kubernetes.io/name: web
    color: green
spec:
  replicas: 0
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
      color: green
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: proyecto-ml
        app.kubernetes.io/component: web
        app.kubernetes.io/name: web
        color: green
    spec:
      serviceAccountName: proyecto-ml-web
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: proyecto-ml-web:local           # overridden by CD
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests: { cpu: "25m",  memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
