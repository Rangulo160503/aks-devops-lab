jobs:
  - job: validate
    displayName: Lint & static checks
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - task: UsePythonVersion@0
        inputs:
          versionSpec: '3.12'

      - script: |
          python -m pip install --upgrade pip
          pip install ruff==0.7.4
          ruff check app/backend/src app/backend/tests
          ruff format --check app/backend/src app/backend/tests
        displayName: Ruff (lint + format)

      - task: NodeTool@0
        inputs:
          versionSpec: '20.x'

      - script: |
          set -e
          cd app/frontend
          npm install --no-audit --no-fund
          npx tsc -b --noEmit
        displayName: Frontend typecheck

      - script: |
          set -e
          # Validate Kubernetes manifests with kubeconform (faster than kubeval).
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /tmp
          /tmp/kubeconform -strict -summary -ignore-missing-schemas \
            infra/kubernetes/base infra/kubernetes/overlays/blue-green
        displayName: kubeconform

      - script: |
          set -e
          curl -sSL https://releases.hashicorp.com/terraform/1.9.8/terraform_1.9.8_linux_amd64.zip -o /tmp/tf.zip
          unzip -q /tmp/tf.zip -d /tmp && sudo mv /tmp/terraform /usr/local/bin/
          terraform -chdir=infra/terraform fmt -check -recursive
          terraform -chdir=infra/terraform init -backend=false -input=false
          terraform -chdir=infra/terraform validate
        displayName: Terraform fmt + validate
