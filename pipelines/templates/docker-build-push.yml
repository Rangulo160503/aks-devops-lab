parameters:
  - name: imageName
    type: string
  - name: context
    type: string
  - name: buildArgs
    type: string
    default: ''

jobs:
  - job: docker_${{ replace(parameters.imageName, '-', '_') }}
    displayName: Build & push ${{ parameters.imageName }}
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - task: Docker@2
        displayName: Login to ACR
        inputs:
          command: login
          containerRegistry: $(acrServiceConnection)

      - task: Docker@2
        displayName: Build & push image
        inputs:
          command: buildAndPush
          repository: ${{ parameters.imageName }}
          containerRegistry: $(acrServiceConnection)
          dockerfile: ${{ parameters.context }}/Dockerfile
          buildContext: ${{ parameters.context }}
          tags: |
            $(imageTag)
            latest
          arguments: --build-arg ${{ parameters.buildArgs }}
        condition: ne('${{ parameters.buildArgs }}', '')

      - task: Docker@2
        displayName: Build & push image (no build args)
        inputs:
          command: buildAndPush
          repository: ${{ parameters.imageName }}
          containerRegistry: $(acrServiceConnection)
          dockerfile: ${{ parameters.context }}/Dockerfile
          buildContext: ${{ parameters.context }}
          tags: |
            $(imageTag)
            latest
        condition: eq('${{ parameters.buildArgs }}', '')
