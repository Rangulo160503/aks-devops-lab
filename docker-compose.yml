services:
  backend:
    build: .
    image: proyecto-ml-backend:local
    container_name: proyecto-ml-backend
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./data.db:/app/data.db
    restart: unless-stopped

