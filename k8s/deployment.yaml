# Two Deployments (API + static web). One replica each for a small/cheap lab.
#
# Images follow: pmldevacr.azurecr.io/proyecto-ml:<tag> with tags `backend`
# and `frontend` (immutable tags like `backend-2026.05.09` are recommended for prod).
#
# AKS + ACR: attach ACR to the cluster (`az aks update --attach-acr`) so you do
# not need imagePullSecrets here.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: proyecto-ml
  labels:
    app.kubernetes.io/part-of: proyecto-ml
    app.kubernetes.io/component: api
    app.kubernetes.io/name: api
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: proyecto-ml
        app.kubernetes.io/component: api
        app.kubernetes.io/name: api
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # Lab tag; use unique tags per build in real pipelines.
          image: pmldevacr.azurecr.io/proyecto-ml:backend
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_COLOR
              value: "blue"
          envFrom:
            - configMapRef:
                name: proyecto-ml-config
            - secretRef:
                name: proyecto-ml-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "384Mi"
          # DB connectivity can lag right after pod start; avoid CrashLoop thrash.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: proyecto-ml
  labels:
    app.kubernetes.io/part-of: proyecto-ml
    app.kubernetes.io/component: web
    app.kubernetes.io/name: web
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: proyecto-ml
        app.kubernetes.io/component: web
        app.kubernetes.io/name: web
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 15
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: pmldevacr.azurecr.io/proyecto-ml:frontend
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "25m"
              memory: "48Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
