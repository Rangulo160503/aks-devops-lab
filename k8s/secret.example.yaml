# Example Secret only — replace values and apply out-of-band (do not commit real credentials).
#
#   kubectl -n proyecto-ml create secret generic proyecto-ml-secrets \
#     --from-literal=SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=DATABASE_URL="postgresql+psycopg://USER:PASS@HOST:5432/DBNAME?sslmode=require"
#
# For production, prefer Azure Key Vault + CSI driver or External Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: proyecto-ml-secrets
  namespace: proyecto-ml
  labels:
    app.kubernetes.io/part-of: proyecto-ml
type: Opaque
stringData:
  SECRET_KEY: "change-me-to-a-long-random-string"
  DATABASE_URL: "postgresql+psycopg://proyectoml%40pml-dev-pg:SimplePass123!@pml-dev-pg.postgres.database.azure.com:5432/proyectoml?sslmode=require"
