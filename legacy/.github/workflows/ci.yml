name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Proyecto_ML
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Proyecto_ML/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Import smoke test
        env:
          SECRET_KEY: ci-secret
        run: |
          python -c "from backend.models.run_history import ensure_schema; ensure_schema(); print('schema OK')"
          python -c "import sys; sys.path.insert(0, '.'); from backend import main; print('routes:', len(list(main.app.url_map.iter_rules())))"

      - name: Pytest
        env:
          SECRET_KEY: ci-secret
        run: pytest -q

  frontend:
    name: Frontend (React/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Proyecto_ML/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Proyecto_ML/frontend/package-lock.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
