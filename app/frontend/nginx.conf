# Production nginx config for the SPA container.
#
# Notes:
# - Listens on 8080 (non-root friendly, matches container port).
# - Serves the SPA with a try_files fallback so client-side routes work.
# - `/api/*` is NOT proxied here. In Kubernetes the Ingress sends `/api` to the
#   backend Service; this container only serves static assets. In docker-compose
#   we rely on the Vite dev server (frontend talks to the backend directly).
# - `/healthz` is a tiny static endpoint for the K8s liveness/readiness probe.

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;

  # Use writable temp dirs (read-only root filesystem in K8s).
  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  log_format json escape=json
    '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
    '"uri":"$request_uri","status":$status,"bytes":$bytes_sent,'
    '"referer":"$http_referer","ua":"$http_user_agent","rt":$request_time}';
  access_log /dev/stdout json;

  server {
    listen       8080 default_server;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Hashed asset bundles -> aggressive cache.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|svg|ico)$ {
      try_files $uri =404;
      expires 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
    }

    # SPA fallback: any unknown path returns index.html (no cache).
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-store";
    }

    location = /healthz {
      access_log off;
      add_header Content-Type application/json;
      return 200 '{"status":"ok","component":"frontend"}';
    }
  }
}
