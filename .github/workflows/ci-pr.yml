name: CI (PR gate)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
      SECRET_KEY: ci-secret
      APP_ENV: test
      APP_COLOR: blue
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/backend/requirements-dev.txt
      - run: pip install -r app/backend/requirements-dev.txt
      - run: pytest -q
        working-directory: app/backend

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm install --no-audit --no-fund
        working-directory: app/frontend
      - run: npm run typecheck
        working-directory: app/frontend
      - run: npm run build
        working-directory: app/frontend

  manifests:
    name: Manifests (kubeconform + tf fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /tmp
          /tmp/kubeconform -strict -summary -ignore-missing-schemas \
            infra/kubernetes/base infra/kubernetes/overlays/blue-green
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - run: terraform -chdir=infra/terraform fmt -check -recursive
      - run: terraform -chdir=infra/terraform init -backend=false -input=false
      - run: terraform -chdir=infra/terraform validate
